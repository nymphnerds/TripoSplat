<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TripoSplat</title>
  <script src="/assets/vendor/lucide-0.468.0.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07100f;
      --surface: #0b1514;
      --line: #1b3536;
      --line-2: #284446;
      --text: #f0faf7;
      --muted: #9bb9b4;
      --dim: #789d98;
      --teal: #29e6da;
      --lime: #97df48;
      --amber: #ff8a2a;
      --danger: #ff5e6c;
      --font-mono: "Cascadia Mono", "DM Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      --font-body: Inter, "Segoe UI", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(125deg, #020807 0%, #03100e 44%, #061411 78%, #081816 100%);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      letter-spacing: 0;
    }
    button, input, select { font: inherit; letter-spacing: 0; }
    * { scrollbar-width: thin; scrollbar-color: rgba(41, 230, 218, 0.78) transparent; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { border-radius: 999px; background: rgba(41, 230, 218, 0.72); }

    .app {
      height: 100vh;
      min-height: 560px;
      display: grid;
      grid-template-columns: 360px minmax(400px, 1fr);
      background: rgba(2, 8, 7, 0.72);
    }
    .sidebar {
      min-width: 0;
      height: 100vh;
      overflow-y: auto;
      padding: 18px 20px 16px;
      border-right: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(8, 17, 18, 0.94), rgba(5, 12, 12, 0.98));
    }
    .section {
      padding: 15px 0;
      border-top: 1px solid rgba(33, 71, 74, 0.72);
    }
    .section:first-child { padding-top: 0; border-top: 0; }
    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 10px;
      color: var(--lime);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .section-title::before { content: "//"; color: var(--teal); }
    .source-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 10px;
    }
    .source-copy {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .drop {
      position: relative;
      aspect-ratio: 1 / 1;
      width: 100%;
      display: grid;
      place-items: center;
      padding: 10px;
      border: 1px dashed rgba(41, 230, 218, 0.36);
      border-radius: 8px;
      background:
        radial-gradient(circle at 50% 28%, rgba(41, 230, 218, 0.08), transparent 34%),
        rgba(11, 21, 20, 0.66);
      overflow: hidden;
      cursor: pointer;
    }
    .drop.drag { border-color: var(--lime); background-color: rgba(15, 32, 34, 0.9); }
    .drop img {
      display: none;
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      padding: 10px;
      object-fit: contain;
      object-position: center;
      background:
        linear-gradient(45deg, rgba(255,255,255,0.025) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,0.025) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.025) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.025) 75%);
      background-size: 18px 18px;
      background-position: 0 0, 0 9px, 9px -9px, -9px 0;
    }
    .drop-hint {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 8px;
      justify-items: center;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
    }
    .drop-hint svg { width: 30px; height: 30px; color: var(--muted); }

    .command-deck { display: grid; gap: 7px; margin-top: 10px; }
    .command-row { display: grid; gap: 7px; align-items: stretch; }
    .source-tools { grid-template-columns: 1.22fr 0.78fr; }
    .export-tools { grid-template-columns: 1fr 1fr; }
    .btn {
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 5px 8px;
      border: 1px solid var(--line-2);
      border-radius: 5px;
      color: var(--teal);
      background: rgba(15, 26, 28, 0.85);
      font-family: var(--font-mono);
      font-size: 10.5px;
      font-weight: 850;
      line-height: 1.1;
      white-space: nowrap;
      cursor: pointer;
    }
    .btn::before { content: "//"; color: var(--lime); }
    .btn:hover:not(:disabled) { color: var(--lime); border-color: #315659; background: #122022; }
    .btn.primary {
      color: #06110f;
      border-color: var(--lime);
      background: linear-gradient(90deg, var(--lime), rgba(41, 230, 218, 0.92));
      font-weight: 950;
    }
    .btn.primary::before { color: #06110f; }
    .btn.danger {
      color: #ffb15f;
      border-color: rgba(255, 139, 39, 0.52);
      background: rgba(37, 20, 12, 0.82);
    }
    .btn:disabled {
      color: #5e7a75;
      border-color: #1f3637;
      background: rgba(11, 20, 21, 0.72);
      cursor: not-allowed;
      opacity: 0.72;
    }
    .btn:disabled::before { color: #355a56; }
    .command-row .btn {
      width: 100%;
      min-width: 0;
      height: 30px;
      min-height: 30px;
      padding: 3px 8px;
      font-size: 9.8px;
      text-align: center;
    }

    label {
      display: grid;
      gap: 6px;
      margin: 10px 0 0;
      color: #dcefeb;
      font-size: 11.5px;
      font-weight: 750;
    }
    input, select {
      min-width: 0;
      width: 100%;
      height: 32px;
      border: 1px solid var(--line-2);
      border-radius: 5px;
      padding: 5px 8px;
      color: var(--text);
      background: rgba(5, 14, 14, 0.9);
      outline: none;
    }
    input[type="range"] { padding: 0; accent-color: var(--teal); }
    .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .value-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 800;
    }
    .status-card {
      display: grid;
      gap: 7px;
      padding: 10px;
      border: 1px solid rgba(40, 68, 70, 0.82);
      border-radius: 8px;
      background: rgba(9, 18, 19, 0.76);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .status-card .status-line { display: flex; justify-content: space-between; gap: 12px; }
    .status-card .status-line strong { color: var(--text); font-family: var(--font-mono); font-size: 10.5px; }

    .stage {
      min-width: 0;
      min-height: 0;
      height: 100vh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      border-left: 1px solid rgba(33, 71, 74, 0.58);
      background:
        radial-gradient(circle at 50% 18%, rgba(41, 230, 218, 0.07), transparent 36%),
        rgba(3, 10, 10, 0.35);
    }
    .topbar {
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(5, 13, 13, 0.72);
    }
    .status {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 850;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .dot {
      width: 9px;
      height: 9px;
      flex: 0 0 auto;
      border-radius: 999px;
      background: var(--muted);
      box-shadow: 0 0 18px rgba(155, 185, 180, 0.35);
    }
    .dot.ready { background: var(--lime); box-shadow: 0 0 18px rgba(151, 223, 72, 0.45); }
    .dot.work { background: var(--teal); box-shadow: 0 0 18px rgba(41, 230, 218, 0.5); }
    .dot.err { background: var(--danger); box-shadow: 0 0 18px rgba(255, 94, 108, 0.45); }

    .viewer {
      min-width: 0;
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 16px 24px 14px;
      position: relative;
      overflow: hidden;
    }
    .splat-shell {
      width: 100%;
      height: 100%;
      min-height: 0;
      border: 1px solid rgba(40, 68, 70, 0.9);
      border-radius: 8px;
      background:
        linear-gradient(rgba(2, 8, 7, 0.36), rgba(2, 8, 7, 0.72)),
        url("/assets/nymphs_preview_forest.png") center center / cover no-repeat,
        rgba(4, 12, 11, 0.82);
      display: grid;
      place-items: center;
      overflow: hidden;
      position: relative;
    }
    .splat-shell canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
    }
    .empty {
      display: grid;
      gap: 8px;
      place-items: center;
      color: var(--dim);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 900;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 20px;
      position: relative;
      z-index: 1;
    }
    .empty::before {
      content: "Generated splat appears here.";
      color: var(--teal);
      font-size: 11px;
      line-height: 1;
      white-space: nowrap;
    }
    .viewer-hud {
      position: absolute;
      left: 14px;
      bottom: 14px;
      z-index: 3;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      pointer-events: none;
    }
    .pill {
      max-width: min(520px, 70vw);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border: 1px solid rgba(40, 68, 70, 0.72);
      border-radius: 5px;
      padding: 5px 8px;
      background: rgba(4, 11, 11, 0.78);
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 800;
    }

    .progress {
      padding: 9px 24px 10px;
      display: grid;
      gap: 6px;
      align-content: end;
      border-top: 1px solid var(--line);
      background: rgba(11, 23, 24, 0.92);
      font-family: var(--font-mono);
    }
    .progress .status-line {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      color: var(--muted);
      font-size: 11px;
      overflow: hidden;
    }
    .progress .status-line span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .model-line {
      min-width: 0;
      overflow: hidden;
      color: var(--dim);
      font-size: 10.5px;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .model-line span:first-child {
      color: var(--teal);
      font-weight: 900;
      text-transform: uppercase;
    }
    .progress-line {
      display: grid;
      grid-template-columns: 160px minmax(0, 1fr) 86px;
      gap: 10px;
      color: var(--muted);
      align-items: center;
    }
    .progress-stage {
      color: var(--text);
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    #progress-detail {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #progress-percent { text-align: right; }
    .bar {
      height: 6px;
      border-radius: 999px;
      background: #223532;
      overflow: hidden;
    }
    .bar span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--teal), var(--lime), var(--amber));
      transition: width 0.22s ease;
    }
    .strip-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      margin-top: 6px;
      margin-bottom: 6px;
    }
    .strip-title {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      color: var(--muted);
      font-family: Consolas, monospace;
      font-weight: 900;
      text-transform: uppercase;
    }
    .strip-title span:first-child { color: var(--lime); }
    .strip-title span:last-child {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      color: var(--teal);
    }
    .strip-controls,
    .strip-select-actions {
      display: flex;
      align-items: center;
      flex-wrap: nowrap;
      gap: 6px;
      min-width: 0;
      white-space: nowrap;
    }
    .strip-controls button,
    .strip-select-actions button {
      min-height: 28px;
      padding: 0 9px;
      border: 1px solid var(--line-2);
      border-radius: 5px;
      color: var(--teal);
      background: rgba(15, 26, 28, 0.85);
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 9.8px;
      font-weight: 900;
    }
    .strip-controls button:disabled,
    .strip-select-actions button:disabled {
      opacity: 0.45;
      cursor: default;
    }
    .strip-browser {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
    .folder-select {
      height: 28px;
      font-size: 11px;
      font-family: var(--font-mono);
    }
    .gallery {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 124px;
      gap: 8px;
      overflow-x: auto;
      overscroll-behavior-inline: contain;
      min-height: 0;
    }
    .gallery:empty { display: none; }
    .thumb {
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 8px;
      background: #08100f;
      padding: 5px;
      display: grid;
      grid-template-rows: 60px auto;
      gap: 5px;
      cursor: pointer;
      min-width: 0;
    }
    .thumb.selected { border-color: var(--lime); }
    .thumb img,
    .thumb .thumb-fallback {
      width: 100%;
      height: 60px;
      object-fit: contain;
      object-position: center center;
      border-radius: 5px;
      background: #020403;
    }
    .thumb .thumb-fallback {
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 10px;
    }
    .thumb span {
      color: var(--muted);
      font-size: 11px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .thumb.selected span { color: var(--lime); }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      max-width: min(720px, calc(100vw - 36px));
      padding: 9px 12px;
      border: 1px solid var(--line-2);
      border-radius: 8px;
      background: rgba(4, 12, 12, 0.94);
      color: var(--text);
      font-size: 12px;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
      transition: opacity 160ms ease, transform 160ms ease;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 760px) {
      body { overflow: auto; }
      .app { grid-template-columns: 1fr; height: auto; min-height: 100vh; }
      .sidebar { height: auto; border-right: 0; border-bottom: 1px solid var(--line); }
      .stage { height: 78vh; min-height: 560px; }
      .progress-line { grid-template-columns: 100px minmax(0, 1fr) 54px; }
      .strip-browser { grid-template-columns: 1fr; }
      .strip-select-actions { overflow-x: auto; }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="sidebar">
      <section class="section">
        <div class="source-head">
          <h2 class="section-title">Source</h2>
          <span class="source-copy" id="source-label">No image</span>
        </div>
        <div class="drop" id="drop">
          <input id="source-file" type="file" accept="image/*" hidden>
          <img id="source-preview" alt="Source preview">
          <div class="drop-hint" id="drop-hint"><i data-lucide="image-plus"></i><span>Drop image</span></div>
        </div>
        <div class="command-deck">
          <div class="command-row source-tools">
            <button class="btn" id="pick-source" type="button">Pick Image</button>
            <button class="btn danger" id="clear-source" type="button" disabled>Clear</button>
          </div>
          <div class="command-row">
            <button class="btn primary" id="generate" type="button" disabled>Generate Splat</button>
          </div>
        </div>
      </section>

      <section class="section">
        <h2 class="section-title">Runtime</h2>
        <div class="field-grid">
          <label>Seed
            <input id="seed" type="number" value="42" min="0" step="1">
          </label>
          <label>Output
            <select id="output-format">
              <option value="both">PLY + SPLAT</option>
              <option value="ply">PLY</option>
              <option value="splat">SPLAT</option>
            </select>
          </label>
        </div>
        <label>
          <span class="value-row"><span>Gaussians</span><span id="gaussian-value">262144</span></span>
          <select id="num-gaussians">
            <option value="32768">32768</option>
            <option value="65536">65536</option>
            <option value="131072">131072</option>
            <option value="262144" selected>262144</option>
          </select>
        </label>
      </section>

      <section class="section">
        <h2 class="section-title">Advanced Parameters</h2>
        <label>
          <span class="value-row"><span>Steps</span><span id="steps-value">20</span></span>
          <input id="steps" type="range" min="1" max="50" step="1" value="20">
        </label>
        <label>
          <span class="value-row"><span>Guidance</span><span id="guidance-value">3.0</span></span>
          <input id="guidance" type="range" min="1" max="10" step="0.5" value="3">
        </label>
        <label>
          <span class="value-row"><span>Shift</span><span id="shift-value">3.0</span></span>
          <input id="shift" type="range" min="1" max="8" step="0.5" value="3">
        </label>
        <label>
          <span class="value-row"><span>Matte erode</span><span id="erode-value">1</span></span>
          <input id="erode" type="range" min="0" max="6" step="1" value="1">
        </label>
      </section>

      <section class="section">
        <h2 class="section-title">Status</h2>
        <div class="status-card">
          <div class="status-line"><span>Model files</span><strong id="model-state">checking</strong></div>
          <div class="status-line"><span>Pipeline</span><strong id="pipeline-state">not loaded</strong></div>
          <div class="status-line"><span>Last output</span><strong id="output-state">none</strong></div>
        </div>
        <div class="command-deck">
          <div class="command-row export-tools">
            <button class="btn" id="download-ply" type="button" disabled>PLY</button>
            <button class="btn" id="download-splat" type="button" disabled>SPLAT</button>
          </div>
        </div>
      </section>
    </aside>

    <section class="stage">
      <header class="topbar">
        <div class="status"><span class="dot" id="dot"></span><span id="status-text">Waiting for image</span></div>
        <div class="status">TripoSplat</div>
      </header>
      <section class="viewer">
        <div class="splat-shell" id="splat-shell">
          <div class="empty" id="empty" aria-label="Generated splat appears here."></div>
          <div class="viewer-hud" id="viewer-hud"></div>
        </div>
      </section>
      <section class="progress">
        <div class="status-line">
          <span id="runtime-text">TripoSplat</span>
          <span id="output-label">No output</span>
        </div>
        <div class="model-line"><span>Preview</span> <span id="selected-output-text">PLY / SPLAT</span></div>
        <div class="progress-line">
          <span class="progress-stage" id="progress-stage">Idle</span>
          <span id="progress-detail">Waiting for source image.</span>
          <span id="progress-percent">0%</span>
        </div>
        <div class="bar"><span id="progress-bar"></span></div>
        <div class="strip-head">
          <div class="strip-title"><span>Browse</span><span id="strip-label">Recent splats (0)</span></div>
          <div class="strip-controls">
            <button id="strip-prev" type="button" title="Previous output">&lt;</button>
            <button id="strip-next" type="button" title="Next output">&gt;</button>
          </div>
        </div>
        <div class="strip-browser">
          <select class="folder-select" id="output-folder" aria-label="Output folder"></select>
          <div class="strip-select-actions">
            <button id="refresh-gallery" type="button">Refresh</button>
            <button id="open-outputs" type="button">Open Outputs</button>
          </div>
        </div>
        <div class="gallery" id="gallery"></div>
      </section>
    </section>
  </main>
  <div class="toast" id="toast"></div>

  <script type="importmap">
    {
      "imports": {
        "three": "/assets/vendor/three.module.js",
        "three/addons/": "/assets/vendor/three-addons/",
        "@sparkjsdev/spark": "/assets/vendor/spark.module.js"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { SparkRenderer, SplatMesh } from "@sparkjsdev/spark";

    const $ = (id) => document.getElementById(id);
    const state = {
      sourceFile: null,
      sourceObjectUrl: "",
      sourceDataUrl: "",
      busy: false,
      progressTimer: null,
      scene: null,
      renderer: null,
      controls: null,
      camera: null,
      spark: null,
      splatRoot: null,
      splat: null,
      outputs: [],
      visibleOutputs: [],
      outputView: "recent",
      selectedOutput: null,
      lastOutputs: {},
    };

    function toast(message) {
      const el = $("toast");
      el.textContent = message;
      el.classList.add("show");
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => el.classList.remove("show"), 3200);
    }

    function setStatus(text, kind = "") {
      $("status-text").textContent = text;
      $("dot").className = `dot ${kind}`;
    }

    function setProgress(stage, detail, percent) {
      const value = Number.isFinite(percent) ? Math.max(0, Math.min(100, percent)) : 0;
      $("progress-stage").textContent = stage || "Idle";
      $("progress-detail").textContent = detail || "";
      $("progress-percent").textContent = `${Math.round(value)}%`;
      $("progress-bar").style.width = `${value}%`;
    }

    function errorText(err) {
      const raw = String(err?.message || err || "");
      try {
        const parsed = JSON.parse(raw);
        if (parsed.detail?.message) return parsed.detail.message;
        if (parsed.detail) return typeof parsed.detail === "string" ? parsed.detail : JSON.stringify(parsed.detail);
      } catch {}
      return raw || "Unexpected error.";
    }

    function updateSliderLabels() {
      $("steps-value").textContent = $("steps").value;
      $("guidance-value").textContent = Number($("guidance").value).toFixed(1);
      $("shift-value").textContent = Number($("shift").value).toFixed(1);
      $("erode-value").textContent = $("erode").value;
      $("gaussian-value").textContent = $("num-gaussians").value;
    }

    function updateButtons() {
      const hasSource = !!state.sourceFile;
      $("pick-source").disabled = state.busy;
      $("clear-source").disabled = state.busy || !hasSource;
      $("generate").disabled = state.busy || !hasSource;
      $("download-ply").disabled = !state.lastOutputs.ply;
      $("download-splat").disabled = !state.lastOutputs.splat;
      $("strip-prev").disabled = state.visibleOutputs.length < 2;
      $("strip-next").disabled = state.visibleOutputs.length < 2;
      $("refresh-gallery").disabled = state.busy;
      $("output-folder").disabled = state.outputs.length === 0;
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(reader.error || new Error("Could not read file."));
        reader.readAsDataURL(file);
      });
    }

    async function setSourceFile(file) {
      if (!file) return;
      if (!file.type?.startsWith("image/")) {
        toast("Choose an image file.");
        return;
      }
      state.sourceFile = file;
      state.sourceDataUrl = await fileToDataUrl(file);
      if (state.sourceObjectUrl) URL.revokeObjectURL(state.sourceObjectUrl);
      state.sourceObjectUrl = URL.createObjectURL(file);
      $("source-preview").src = state.sourceObjectUrl;
      $("source-preview").style.display = "block";
      $("drop-hint").style.display = "none";
      $("source-label").textContent = file.name;
      setStatus("Image ready", "ready");
      setProgress("Ready", "Source image selected.", 0);
      updateButtons();
    }

    function clearSource() {
      state.sourceFile = null;
      state.sourceDataUrl = "";
      if (state.sourceObjectUrl) URL.revokeObjectURL(state.sourceObjectUrl);
      state.sourceObjectUrl = "";
      $("source-file").value = "";
      $("source-preview").removeAttribute("src");
      $("source-preview").style.display = "none";
      $("drop-hint").style.display = "grid";
      $("source-label").textContent = "No image";
      setStatus("Waiting for image");
      setProgress("Idle", "Waiting for source image.", 0);
      updateButtons();
    }

    function initViewer() {
      if (state.renderer) return;
      const shell = $("splat-shell");
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(45, shell.clientWidth / Math.max(shell.clientHeight, 1), 0.01, 1000);
      camera.position.set(0, 0.25, 1.8);
      const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(shell.clientWidth, shell.clientHeight);
      shell.appendChild(renderer.domElement);
      const spark = new SparkRenderer({ renderer });
      scene.add(spark);
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.07;
      controls.minDistance = 0.2;
      controls.maxDistance = 50;
      controls.target.set(0, 0, 0);
      state.scene = scene;
      state.camera = camera;
      state.renderer = renderer;
      state.controls = controls;
      state.spark = spark;
      renderer.setAnimationLoop(() => {
        controls.update();
        renderer.render(scene, camera);
      });
      window.addEventListener("resize", resizeViewer);
    }

    function resizeViewer() {
      if (!state.renderer || !state.camera) return;
      const shell = $("splat-shell");
      state.camera.aspect = shell.clientWidth / Math.max(shell.clientHeight, 1);
      state.camera.updateProjectionMatrix();
      state.renderer.setSize(shell.clientWidth, shell.clientHeight);
    }

    function clearSplat() {
      if (state.splatRoot && state.scene) state.scene.remove(state.splatRoot);
      state.splatRoot = null;
      state.splat = null;
    }

    function loadSplat(url, label) {
      if (!url) return;
      initViewer();
      clearSplat();
      const splat = new SplatMesh({ url });
      const root = new THREE.Group();
      root.add(splat);
      splat.rotation.y = Math.PI / 2;
      root.rotation.x = Math.PI;
      state.scene.add(root);
      state.splatRoot = root;
      state.splat = splat;
      $("empty").style.display = "none";
      $("viewer-hud").innerHTML = `<span class="pill">${label}</span>`;
      setTimeout(() => {
        if (!state.splatRoot || !state.camera || !state.controls) return;
        const box = new THREE.Box3().setFromObject(state.splatRoot);
        if (box.isEmpty() || !Number.isFinite(box.min.x)) return;
        const center = new THREE.Vector3();
        const size = new THREE.Vector3();
        box.getCenter(center);
        box.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z, 0.1);
        state.camera.position.copy(center).add(new THREE.Vector3(0, maxDim * 0.12, maxDim * 1.8));
        state.controls.target.copy(center);
        state.controls.update();
      }, 900);
    }

    async function refreshServerInfo() {
      try {
        const response = await fetch("/server_info", { cache: "no-store" });
        const info = await response.json();
        $("model-state").textContent = info.models_ready ? "ready" : "missing";
        $("pipeline-state").textContent = info.pipeline_loaded ? "loaded" : "not loaded";
        $("runtime-text").textContent = info.models_ready ? "models ready" : "fetch models";
      } catch {
        $("model-state").textContent = "unknown";
      }
    }

    function outputKey(output) {
      return output?.id || output?.relative_path || output?.url || "";
    }

    function outputDateKey(output) {
      const modified = Number(output?.modified || 0);
      if (!modified) return "Unknown Date";
      const date = new Date(modified * 1000);
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function outputLabel(output) {
      return output?.id?.replace(/^triposplat_/, "") || output?.id || "Splat";
    }

    function previewOutput(output) {
      return output?.outputs?.splat || output?.outputs?.ply || null;
    }

    function groupOutputRuns(files) {
      const runs = new Map();
      for (const file of files || []) {
        const segments = String(file.relative_path || "").split("/");
        if (segments.length < 2) continue;
        const runId = segments[0];
        const name = segments[segments.length - 1].toLowerCase();
        const run = runs.get(runId) || {
          id: runId,
          modified: 0,
          outputs: {},
          thumbnail: null,
          metadata: null,
        };
        run.modified = Math.max(run.modified, Number(file.modified || 0));
        if (name.endsWith(".ply")) run.outputs.ply = file;
        if (name.endsWith(".splat")) run.outputs.splat = file;
        if (name.endsWith(".webp")) run.thumbnail = file;
        if (name.endsWith(".json")) run.metadata = file;
        runs.set(runId, run);
      }
      return Array.from(runs.values())
        .filter((run) => run.outputs.ply || run.outputs.splat)
        .sort((a, b) => b.modified - a.modified)
        .slice(0, 80);
    }

    function syncOutputViewOptions(outputs) {
      const select = $("output-folder");
      const dates = [...new Set(outputs.map(outputDateKey))].sort().reverse();
      const validViews = new Set(["recent", ...dates.map((date) => `date:${date}`)]);
      if (!validViews.has(state.outputView)) state.outputView = "recent";
      select.innerHTML = "";
      const recent = document.createElement("option");
      recent.value = "recent";
      recent.textContent = `Recent (${outputs.length})`;
      select.appendChild(recent);
      for (const date of dates) {
        const count = outputs.filter((output) => outputDateKey(output) === date).length;
        const option = document.createElement("option");
        option.value = `date:${date}`;
        option.textContent = `${date} (${count})`;
        select.appendChild(option);
      }
      select.value = state.outputView;
    }

    function visibleOutputs() {
      syncOutputViewOptions(state.outputs);
      if (state.outputView === "recent") return state.outputs;
      if (state.outputView.startsWith("date:")) {
        const date = state.outputView.slice(5);
        return state.outputs.filter((output) => outputDateKey(output) === date);
      }
      return state.outputs;
    }

    function currentOutputViewLabel() {
      if (state.outputView === "recent") return "Recent splats";
      if (state.outputView.startsWith("date:")) return state.outputView.slice(5);
      return "Splats";
    }

    function showOutput(output, load = true) {
      if (!output) return;
      state.selectedOutput = output;
      state.lastOutputs = output.outputs || {};
      const preview = previewOutput(output);
      $("output-state").textContent = output.id;
      $("output-label").textContent = output.id;
      $("selected-output-text").textContent = [
        output.outputs?.ply ? "PLY" : "",
        output.outputs?.splat ? "SPLAT" : "",
      ].filter(Boolean).join(" / ") || "PLY / SPLAT";
      if (load && preview) loadSplat(preview.url, output.id);
      for (const node of document.querySelectorAll(".thumb")) {
        node.classList.toggle("selected", node.dataset.key === outputKey(output));
      }
      updateButtons();
    }

    function renderGallery() {
      const gallery = $("gallery");
      gallery.innerHTML = "";
      state.visibleOutputs = visibleOutputs();
      const label = currentOutputViewLabel();
      $("strip-label").textContent = `${label} (${state.visibleOutputs.length})`;
      for (const output of state.visibleOutputs) {
        const node = document.createElement("button");
        node.className = "thumb";
        node.type = "button";
        node.dataset.key = outputKey(output);
        if (state.selectedOutput && outputKey(state.selectedOutput) === outputKey(output)) node.classList.add("selected");
        if (output.thumbnail) {
          const img = document.createElement("img");
          img.src = output.thumbnail.url;
          img.alt = "";
          node.appendChild(img);
        } else {
          const fallback = document.createElement("div");
          fallback.className = "thumb-fallback";
          fallback.textContent = output.outputs?.splat ? "SPLAT" : "PLY";
          node.appendChild(fallback);
        }
        const text = document.createElement("span");
        text.textContent = outputLabel(output);
        node.appendChild(text);
        node.addEventListener("click", () => showOutput(output));
        gallery.appendChild(node);
      }
      if (!state.selectedOutput && state.visibleOutputs[0]) showOutput(state.visibleOutputs[0], false);
      updateButtons();
    }

    async function refreshOutputs(selectRunId = "") {
      try {
        const response = await fetch("/api/outputs", { cache: "no-store" });
        const data = await response.json();
        state.outputs = groupOutputRuns(data.outputs);
        renderGallery();
        const selected = state.outputs.find((output) => output.id === selectRunId);
        if (selected) showOutput(selected, false);
      } catch {
        renderGallery();
      }
    }

    function selectFromVisible(offset) {
      if (!state.visibleOutputs.length) return;
      const current = state.visibleOutputs.findIndex((output) => outputKey(output) === outputKey(state.selectedOutput));
      const next = current < 0 ? 0 : (current + offset + state.visibleOutputs.length) % state.visibleOutputs.length;
      showOutput(state.visibleOutputs[next]);
    }

    function scrollGalleryWithWheel(event) {
      const gallery = $("gallery");
      if (!gallery || gallery.scrollWidth <= gallery.clientWidth) return;
      const dominantY = Math.abs(event.deltaY) >= Math.abs(event.deltaX);
      const delta = dominantY ? event.deltaY : event.deltaX;
      if (!delta) return;
      const multiplier = event.deltaMode === 1 ? 32 : event.deltaMode === 2 ? gallery.clientWidth : 1;
      event.preventDefault();
      gallery.scrollLeft += delta * multiplier;
    }

    async function pollTask() {
      try {
        const response = await fetch("/active_task", { cache: "no-store" });
        if (!response.ok) return;
        const task = await response.json();
        const percent = Number(task.progress_percent);
        if (task.status === "processing") {
          setProgress(task.stage || "Working", task.detail || "Processing.", Number.isFinite(percent) ? percent : 8);
        }
      } catch {}
    }

    function startProgress() {
      clearInterval(state.progressTimer);
      pollTask();
      state.progressTimer = setInterval(pollTask, 700);
    }

    function stopProgress(done, detail) {
      clearInterval(state.progressTimer);
      state.progressTimer = null;
      if (done) setProgress("Done", detail || "Complete.", 100);
    }

    async function generate() {
      if (state.busy) return;
      if (!state.sourceDataUrl) {
        toast("Choose a source image first.");
        return;
      }
      state.busy = true;
      updateButtons();
      setStatus("Generating", "work");
      setProgress("Queued", "Preparing TripoSplat request.", 8);
      startProgress();
      try {
        const payload = {
          image: state.sourceDataUrl,
          seed: Number($("seed").value || 42),
          steps: Number($("steps").value || 20),
          guidance_scale: Number($("guidance").value || 3),
          shift: Number($("shift").value || 3),
          erode_radius: Number($("erode").value || 1),
          num_gaussians: Number($("num-gaussians").value || 262144),
          output_format: $("output-format").value,
        };
        const response = await fetch("/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!response.ok) throw new Error(await response.text());
        const result = await response.json();
        state.lastOutputs = result.outputs || {};
        $("output-state").textContent = result.run_id || "saved";
        $("output-label").textContent = result.run_id || "Splat ready";
        loadSplat(result.preview.url, `${result.num_gaussians.toLocaleString()} gaussians`);
        setStatus("Splat ready", "ready");
        stopProgress(true, "Saved TripoSplat splat outputs.");
        await refreshOutputs(result.run_id || "");
        const selected = state.outputs.find((output) => output.id === result.run_id);
        if (selected) showOutput(selected, false);
      } catch (err) {
        console.error(err);
        setStatus("Generation failed", "err");
        stopProgress(false);
        setProgress("Failed", errorText(err), 0);
        toast(errorText(err));
      } finally {
        state.busy = false;
        refreshServerInfo();
        updateButtons();
      }
    }

    function download(kind) {
      const item = state.lastOutputs[kind];
      if (!item) return;
      window.location.href = item.url;
    }

    function moduleAction(action) {
      window.location.href = `nymphs-module-action://${action}`;
    }

    function bindDrop() {
      const drop = $("drop");
      const input = $("source-file");
      drop.addEventListener("click", () => input.click());
      $("pick-source").addEventListener("click", () => input.click());
      input.addEventListener("change", (event) => setSourceFile(event.target.files?.[0]));
      for (const name of ["dragenter", "dragover"]) {
        drop.addEventListener(name, (event) => {
          event.preventDefault();
          drop.classList.add("drag");
        });
      }
      for (const name of ["dragleave", "drop"]) {
        drop.addEventListener(name, (event) => {
          event.preventDefault();
          drop.classList.remove("drag");
        });
      }
      drop.addEventListener("drop", (event) => {
        event.preventDefault();
        setSourceFile(event.dataTransfer?.files?.[0]);
      });
    }

    function init() {
      lucide.createIcons();
      bindDrop();
      updateSliderLabels();
      for (const id of ["steps", "guidance", "shift", "erode", "num-gaussians"]) {
        $(id).addEventListener("input", updateSliderLabels);
        $(id).addEventListener("change", updateSliderLabels);
      }
      $("clear-source").addEventListener("click", clearSource);
      $("generate").addEventListener("click", generate);
      $("download-ply").addEventListener("click", () => download("ply"));
      $("download-splat").addEventListener("click", () => download("splat"));
      $("refresh-gallery").addEventListener("click", () => refreshOutputs());
      $("open-outputs").addEventListener("click", () => moduleAction("open_outputs"));
      $("strip-prev").addEventListener("click", () => selectFromVisible(-1));
      $("strip-next").addEventListener("click", () => selectFromVisible(1));
      $("output-folder").addEventListener("change", () => {
        state.outputView = $("output-folder").value;
        renderGallery();
      });
      $("gallery").addEventListener("wheel", scrollGalleryWithWheel, { passive: false });
      refreshServerInfo();
      refreshOutputs();
      setProgress("Idle", "Waiting for source image.", 0);
      updateButtons();
    }

    init();
  </script>
</body>
</html>
